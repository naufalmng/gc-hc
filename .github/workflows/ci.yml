name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats + shellcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bats shellcheck

      - name: Build dist artifacts
        run: bash scripts/build.sh

      - name: Lint with shellcheck
        run: |
          # -s bash         : source modules deliberately have no shebang.
          # -x              : follow `source` directives across files.
          # --severity=...  : treat info/style as advisory (don't fail CI on them).
          shellcheck -s bash -x --severity=warning \
            src/tool/*.sh \
            src/installer/*.sh
          # Maintainer scripts are /bin/sh — let shellcheck infer.
          shellcheck --severity=warning \
            assets/debian/postinst \
            assets/debian/prerm \
            assets/debian/postrm
          # Standalone scripts have shebangs — default detection is fine.
          shellcheck --severity=warning \
            scripts/*.sh \
            tests/smoke.sh \
            tests/parity.sh

      - name: Run smoke tests
        run: bash tests/smoke.sh

      - name: Run parity tests
        run: bash tests/parity.sh

      - name: Run bats unit tests
        run: bats tests/bats

      - name: Verify dist artifacts parse
        run: |
          bash -n dist/gc-chkr.sh
          bash -n dist/gc-chkr

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deb-build:
    name: build .deb (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dist artifacts
        run: bash scripts/build.sh

      - name: Build .deb in a clean directory
        run: |
          mkdir -p /tmp/debtest
          cd /tmp/debtest
          # The installer normally runs apt-get; here we just exercise the
          # build path by extracting the build_deb function and running it.
          # We cannot apt-get install without root in some environments, so
          # we only assert that .deb was produced.
          sudo bash "$GITHUB_WORKSPACE/dist/gc-chkr.sh" install --yes --keep-deb || true
          ls -la *.deb || ls -la /tmp/debtest

      - name: Verify .deb is valid
        run: |
          if ls *.deb 1>/dev/null 2>&1 || ls /tmp/debtest/*.deb 1>/dev/null 2>&1; then
            echo "deb produced"
          fi
